<!DOCTYPE html>
<html>
<head>
  <title>Phishing Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Which message would your team trust?</h1>

  <div class="cards">
    <div class="card" data-choice="A">
      <h3>Microsoft Alert</h3>
      <p>Password expires today. Click to stay active.</p>
    </div>

    <div class="card" data-choice="B">
      <h3>Doctor Request</h3>
      <p>Grab gift cards for me, I’ll reimburse you.</p>
    </div>

    <div class="card" data-choice="C">
      <h3>Delivery Notice</h3>
      <p>Confirm address to reschedule delivery.</p>
    </div>
  </div>

  <div id="result" class="hidden"></div>
</div>

<script src="app.js"></script>
</body>
</html>
